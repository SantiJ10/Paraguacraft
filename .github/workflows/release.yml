# Compila Win/Mac/Linux y publica en GitHub Releases.
# Disparadores: tag v* o botón "Run workflow" en Actions.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
      - run: npm ci
        working-directory: launcher
      - run: npm run tauri:build
        working-directory: launcher
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            launcher/src-tauri/target/release/bundle/nsis/Instalar_Paraguacraft_v*.exe
            launcher/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
      - run: npm ci
        working-directory: launcher
      - run: npm run build && npx tauri build
        working-directory: launcher
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            launcher/src-tauri/target/release/bundle/dmg/*.dmg
            launcher/src-tauri/target/release/bundle/macos/*.app.tar.gz

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: npm ci
        working-directory: launcher
      - run: npm run build && npx tauri build
        working-directory: launcher
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            launcher/src-tauri/target/release/bundle/appimage/*.AppImage
            launcher/src-tauri/target/release/bundle/deb/*.deb

  publish:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
