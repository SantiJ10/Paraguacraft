# Compila Win/Mac/Linux y publica en GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  # Evita OOM en runners de GitHub (LTO + codegen-units=1 es muy pesado en CI).
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: launcher
      - run: npm run tauri:build
        working-directory: launcher
      - name: Locate Windows installer
        id: win
        shell: bash
        run: |
          exe=$(find launcher/src-tauri/target -path '*/bundle/nsis/*.exe' 2>/dev/null | head -1)
          if [ -z "$exe" ]; then
            echo "No se encontró instalador NSIS"
            find launcher/src-tauri/target -name '*.exe' 2>/dev/null || true
            exit 1
          fi
          echo "path=$exe" >> "$GITHUB_OUTPUT"
          echo "Instalador: $exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ steps.win.outputs.path }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: launcher
      - run: npm run build && npx tauri build
        working-directory: launcher
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            launcher/src-tauri/target/release/bundle/dmg/*.dmg
            launcher/src-tauri/target/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launcher/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: npm ci
        working-directory: launcher
      - run: npm run build && npx tauri build
        working-directory: launcher
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            launcher/src-tauri/target/release/bundle/appimage/*.AppImage
            launcher/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
