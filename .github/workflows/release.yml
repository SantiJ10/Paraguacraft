# Compila Win/Mac/Linux y publica en GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  CARGO_PROFILE_RELEASE_STRIP: "false"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            tauri_config: src-tauri/tauri.ci.windows.conf.json
          - os: macos-latest
            platform: macos
            tauri_config: src-tauri/tauri.ci.macos.conf.json
          - os: ubuntu-22.04
            platform: linux
            tauri_config: src-tauri/tauri.ci.linux.conf.json

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            libgtk-3-dev \
            build-essential \
            libssl-dev \
            libxdo-dev

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm ci

      - name: Build frontend
        working-directory: launcher
        run: npm run build

      - name: Build Tauri bundles
        working-directory: launcher
        run: npx tauri build --verbose --config ${{ matrix.tauri_config }}

      - name: Rename Windows installer
        if: matrix.platform == 'windows'
        working-directory: launcher
        run: node scripts/rename-windows-installer.mjs

      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            launcher/src-tauri/target/release/bundle/nsis/Instalar_Paraguacraft_*.exe
            launcher/src-tauri/target/release/bundle/nsis/*setup*.exe
          if-no-files-found: error

      - name: Upload macOS bundles
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: launcher/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux bundles
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            launcher/src-tauri/target/release/bundle/appimage/*.AppImage
            launcher/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
