# Release Windows only. Mac/Linux: compilar localmente cuando haga falta.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  CARGO_PROFILE_RELEASE_STRIP: "false"
  CARGO_BUILD_JOBS: "2"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm ci

      - name: Build frontend
        working-directory: launcher
        run: npm run build

      - name: Build Tauri bundles
        working-directory: launcher
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: npx tauri build --verbose --config src-tauri/tauri.ci.windows.conf.json

      - name: Rename Windows installer
        working-directory: launcher
        run: node scripts/rename-windows-installer.mjs

      - name: Patch latest.json (hash + size)
        working-directory: launcher
        run: node scripts/patch-latest-json.mjs

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $exe = Get-ChildItem "launcher/src-tauri/target/release/bundle/nsis/Instalar_Paraguacraft_*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Instalador no encontrado" }
          if ($exe.Length -lt 4000000) { throw "Instalador demasiado chico ($($exe.Length) bytes)" }
          if (-not (Test-Path "latest.json")) { throw "latest.json no generado" }
          Write-Host "OK: $($exe.Name) ($($exe.Length) bytes)"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            launcher/src-tauri/target/release/bundle/nsis/Instalar_Paraguacraft_*.exe
            latest.json
          if-no-files-found: error

  publish:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/Instalar_Paraguacraft_*.exe
            artifacts/**/latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
