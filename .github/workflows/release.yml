# Release Windows: npm ci → tauri NSIS → latest.json → GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI: true
  CARGO_PROFILE_RELEASE_STRIP: "false"
  CARGO_PROFILE_RELEASE_LTO: "false"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_BUILD_JOBS: "1"
  # crates.io a veces corta HTTP/2 en runners de GitHub (curl 55/56).
  CARGO_NET_RETRY: "10"
  CARGO_NET_TIMEOUT: "300"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm ci

      - name: Prefetch Rust dependencies
        working-directory: launcher/src-tauri
        shell: pwsh
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            cargo fetch --locked
            if ($LASTEXITCODE -eq 0) {
              Write-Host "cargo fetch OK (attempt $i)"
              exit 0
            }
            Write-Host "cargo fetch failed (attempt $i/$max), retrying in 20s..."
            Start-Sleep -Seconds 20
          }
          throw "cargo fetch failed after $max attempts"

      - name: Build release (Tauri NSIS + latest.json)
        working-directory: launcher
        shell: pwsh
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          $max = 2
          for ($i = 1; $i -le $max; $i++) {
            npm run release:windows:ci
            if ($LASTEXITCODE -eq 0) {
              Write-Host "release build OK (attempt $i)"
              exit 0
            }
            Write-Host "release build failed (attempt $i/$max), retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          throw "release build failed after $max attempts"

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $exe = Get-ChildItem "launcher/src-tauri/target" -Recurse -Filter "Instalar_Paraguacraft_*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.DirectoryName -match 'bundle[\\/]nsis' } |
            Select-Object -First 1
          if (-not $exe) { throw "Instalador no encontrado bajo launcher/src-tauri/target" }
          if ($exe.Length -lt 4000000) { throw "Instalador demasiado chico ($($exe.Length) bytes)" }
          if (-not (Test-Path "latest.json")) { throw "latest.json no generado" }
          $json = Get-Content "latest.json" -Raw | ConvertFrom-Json
          if ($json.sha256.Length -ne 64) { throw "latest.json sin sha256 valido" }
          Write-Host "OK: $($exe.FullName) ($($exe.Length) bytes) sha256=$($json.sha256)"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            launcher/src-tauri/target/**/bundle/nsis/Instalar_Paraguacraft_*.exe
            latest.json
          if-no-files-found: error

  publish:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          find artifacts -name 'Instalar_Paraguacraft_*.exe' -exec cp {} release/ \;
          find artifacts -name 'latest.json' -exec cp {} release/latest.json \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
