# Release Windows only. Mac/Linux: compilar localmente cuando haga falta.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  CARGO_PROFILE_RELEASE_STRIP: "false"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm ci

      - name: Build frontend
        working-directory: launcher
        run: npm run build

      - name: Build Tauri bundles
        working-directory: launcher
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: npx tauri build --verbose --config src-tauri/tauri.ci.windows.conf.json

      - name: Rename Windows installer
        working-directory: launcher
        run: node scripts/rename-windows-installer.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            launcher/src-tauri/target/release/bundle/nsis/Instalar_Paraguacraft_*.exe
            launcher/src-tauri/target/release/bundle/nsis/*setup*.exe
          if-no-files-found: error

  publish:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
